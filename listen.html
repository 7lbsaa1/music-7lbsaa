<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7lbsaa Music — Listen</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter','Tajawal',sans-serif; background:#0a0a0a; color:#fff; min-height:100vh; overflow-x:hidden; }

nav {
  position:fixed; top:0; left:0; right:0; z-index:200;
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 40px;
  background:rgba(10,10,10,0.92); backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.nav-logo { font-size:20px; font-weight:900; color:#fff; text-decoration:none; }
.nav-logo span { color:#e85d5d; }
.back-btn {
  display:flex; align-items:center; gap:7px;
  color:rgba(255,255,255,0.45); text-decoration:none; font-size:13px;
  transition:color 0.2s;
}
.back-btn:hover { color:#e85d5d; }

/* PAGE LAYOUT */
.page { display:flex; min-height:100vh; padding-top:64px; }

/* SIDEBAR — song list */
.sidebar {
  width:300px; min-width:260px; flex-shrink:0;
  background:#101010; border-right:1px solid rgba(255,255,255,0.06);
  padding:28px 0; overflow-y:auto;
  position:sticky; top:64px; height:calc(100vh - 64px);
}
.sidebar-title {
  font-size:11px; font-weight:700; letter-spacing:3px; text-transform:uppercase;
  color:rgba(255,255,255,0.3); padding:0 24px 16px;
}
.song-item {
  display:flex; align-items:center; gap:14px;
  padding:12px 24px; cursor:pointer;
  transition:background 0.18s;
  border-left:3px solid transparent;
}
.song-item:hover { background:rgba(255,255,255,0.04); }
.song-item.active { background:rgba(232,93,93,0.08); border-left-color:#e85d5d; }
.song-thumb {
  width:46px; height:46px; border-radius:8px; object-fit:cover; flex-shrink:0;
  border:1px solid rgba(255,255,255,0.08);
}
.song-meta { flex:1; min-width:0; }
.song-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.song-singer { font-size:11px; color:#e85d5d; margin-top:2px; }
.song-dur { font-size:11px; color:rgba(255,255,255,0.3); margin-top:2px; }
.now-playing-dot {
  width:6px; height:6px; border-radius:50%; background:#e85d5d;
  flex-shrink:0; display:none;
  animation:blink 1.4s ease-in-out infinite;
}
.song-item.active .now-playing-dot { display:block; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* MAIN CONTENT */
.content { flex:1; display:flex; flex-direction:column; }

/* PLAYER AREA */
.player-area {
  display:grid; grid-template-columns:340px 1fr;
  gap:36px; padding:36px 40px 32px; align-items:start;
}

.player-card {
  background:#141414; border-radius:22px;
  border:1px solid rgba(255,255,255,0.07);
  overflow:hidden; position:sticky; top:100px;
}
.player-cover { position:relative; aspect-ratio:1; overflow:hidden; }
.player-cover img {
  width:100%; height:100%; object-fit:cover;
  display:block; transition:filter 0.4s;
}
.player-cover img.spinning { animation:spin-slow 25s linear infinite; }
@keyframes spin-slow { from{transform:scale(1.04) rotate(0deg)} to{transform:scale(1.04) rotate(360deg)} }
.cover-grad {
  position:absolute; inset:0;
  background:linear-gradient(to bottom,transparent 50%,rgba(20,20,20,0.88));
}

.player-body { padding:22px; }
.song-info-display { margin-bottom:18px; }
.disp-title { font-size:20px; font-weight:700; letter-spacing:-0.4px; direction:rtl; }
.disp-artist { font-size:13px; color:#e85d5d; font-weight:500; margin-top:3px; }

/* PROGRESS */
.prog-wrap { margin-bottom:14px; }
.prog-outer {
  width:100%; height:5px; background:rgba(255,255,255,0.1);
  border-radius:3px; cursor:pointer; position:relative; margin-bottom:7px;
  user-select:none;
}
.prog-inner {
  height:100%; background:#e85d5d; border-radius:3px;
  width:0%; pointer-events:none;
}
.prog-thumb {
  position:absolute; top:50%; right:0;
  width:13px; height:13px; border-radius:50%;
  background:#fff; border:2px solid #e85d5d;
  transform:translate(50%,-50%);
  opacity:0; transition:opacity 0.15s;
  pointer-events:none;
}
.prog-outer:hover .prog-thumb { opacity:1; }
.time-row { display:flex; justify-content:space-between; font-size:11px; color:rgba(255,255,255,0.3); }

/* CONTROLS */
.controls { display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:16px; }
.ctrl-btn {
  background:none; border:none; cursor:pointer;
  color:rgba(255,255,255,0.45); padding:6px;
  display:flex; align-items:center; justify-content:center;
  transition:color 0.18s, transform 0.15s; border-radius:50%;
}
.ctrl-btn:hover { color:#fff; transform:scale(1.12); }
.ctrl-btn.active { color:#e85d5d; }
.ctrl-btn svg { width:20px; height:20px; }
.play-btn {
  width:50px; height:50px; border-radius:50%;
  background:#e85d5d; border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 0 22px rgba(232,93,93,0.35);
  transition:transform 0.18s, box-shadow 0.18s;
}
.play-btn:hover { transform:scale(1.08); box-shadow:0 0 34px rgba(232,93,93,0.5); }
.play-btn svg { width:22px; height:22px; fill:#fff; }
.play-btn .pi { display:block; } .play-btn .pau { display:none; }
.play-btn.playing .pi { display:none; } .play-btn.playing .pau { display:block; }

/* SEEK BUTTONS */
.seek-row { display:flex; gap:8px; margin-bottom:14px; }
.seek-btn {
  flex:1; padding:7px 0;
  background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.09);
  color:rgba(255,255,255,0.5); border-radius:9px; font-size:11px; font-weight:600;
  cursor:pointer; transition:background 0.18s, color 0.18s, border-color 0.18s;
}
.seek-btn:hover { background:rgba(232,93,93,0.12); color:#e85d5d; border-color:rgba(232,93,93,0.25); }

/* VOLUME */
.vol-row { display:flex; align-items:center; gap:9px; margin-bottom:14px; }
.vol-row svg { width:15px; height:15px; fill:rgba(255,255,255,0.35); flex-shrink:0; }
input[type=range] {
  -webkit-appearance:none; flex:1; height:3px;
  background:rgba(255,255,255,0.14); border-radius:2px; cursor:pointer; outline:none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:11px; height:11px;
  border-radius:50%; background:#e85d5d; cursor:pointer;
}
.vol-val { font-size:11px; color:rgba(255,255,255,0.3); min-width:30px; text-align:right; }

/* REPEAT */
.bottom-row { display:flex; align-items:center; gap:10px; }
.repeat-label {
  font-size:11px; color:#e85d5d; background:rgba(232,93,93,0.1);
  padding:3px 10px; border-radius:20px; border:1px solid rgba(232,93,93,0.2);
  display:none;
}
.repeat-label.show { display:inline-block; }

/* LYRICS PANEL */
.lyrics-panel {
  flex:1; padding:36px 40px;
  border-top:1px solid rgba(255,255,255,0.05);
}
.lyrics-toggle-row {
  display:flex; align-items:center; gap:12px; margin-bottom:22px;
}
.lyrics-toggle-label { font-size:15px; font-weight:700; }
.toggle-switch {
  position:relative; width:42px; height:22px;
  cursor:pointer; user-select:none;
}
.toggle-switch input { opacity:0; width:0; height:0; }
.toggle-track {
  position:absolute; inset:0; background:rgba(255,255,255,0.12);
  border-radius:11px; transition:background 0.25s;
}
.toggle-switch input:checked + .toggle-track { background:#e85d5d; }
.toggle-thumb {
  position:absolute; top:3px; left:3px;
  width:16px; height:16px; border-radius:50%; background:#fff;
  transition:transform 0.25s;
}
.toggle-switch input:checked ~ .toggle-thumb { transform:translateX(20px); }

.lyrics-box {
  background:#141414; border-radius:18px;
  border:1px solid rgba(255,255,255,0.07);
  padding:32px 36px; direction:rtl;
  line-height:2.1; font-size:16px;
  color:rgba(255,255,255,0.45);
  max-height:380px; overflow-y:auto;
  display:none;
  scroll-behavior:smooth;
}
.lyrics-box.show { display:block; }
.lyric-line { display:block; padding:5px 0; transition:color 0.3s, font-size 0.25s; }
.lyric-line.active { color:#fff; font-size:18px; font-weight:700; }
.lyric-line.past { color:rgba(255,255,255,0.2); }

/* NO SONG SELECTED */
.no-song {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:80px 20px; text-align:center; color:rgba(255,255,255,0.2);
  gap:14px;
}
.no-song svg { width:56px; height:56px; opacity:0.15; }
.no-song p { font-size:14px; }

@media(max-width:900px){
  .page { flex-direction:column; }
  .sidebar { width:100%; position:static; height:auto; border-right:none; border-bottom:1px solid rgba(255,255,255,0.06); }
  .player-area { grid-template-columns:1fr; }
  .player-card { position:static; }
  nav { padding:14px 20px; }
  .lyrics-panel { padding:20px; }
  .player-area { padding:20px; }
}
</style>

      'يا بنزود يا بنجمل'
    ]
  }
];

const audio = document.getElementById('audio');
const playBtn = document.getElementById('playBtn');
const progOuter = document.getElementById('progOuter');
const progInner = document.getElementById('progInner');
const progThumb = document.getElementById('progThumb');
const curTime = document.getElementById('curTime');
const totTime = document.getElementById('totTime');
const volSlider = document.getElementById('volSlider');
const volVal = document.getElementById('volVal');
const repeatBtn = document.getElementById('repeatBtn');
const repeatLabel = document.getElementById('repeatLabel');
const coverImg = document.getElementById('coverImg');
const dispTitle = document.getElementById('dispTitle');
const dispArtist = document.getElementById('dispArtist');
const bigTitle = document.getElementById('bigTitle');
const bigArtist = document.getElementById('bigArtist');
const lyricsToggle = document.getElementById('lyricsToggle');
const lyricsBox = document.getElementById('lyricsBox');
const lyricsHint = document.getElementById('lyricsHint');
const noSong = document.getElementById('noSong');
const playerUI = document.getElementById('playerUI');

let currentSong = null;
let isRepeat = false;
let isDragging = false;

function fmt(s) {
  if (!isFinite(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function loadSong(song) {
  currentSong = song;
  audio.src = song.src;
  audio.volume = volSlider.value / 100;
  coverImg.src = song.cover;
  dispTitle.textContent = song.title;
  dispArtist.textContent = song.artist;
  bigTitle.textContent = song.title;
  bigArtist.textContent = song.artist;
  progInner.style.width = '0%';
  progThumb.style.left = '0%';
  curTime.textContent = '0:00';
  totTime.textContent = '0:00';
  coverImg.classList.remove('spinning');
  playBtn.classList.remove('playing');

  // lyrics
  lyricsBox.innerHTML = '';
  song.lyrics.forEach((line, i) => {
    const span = document.createElement('span');
    span.className = 'lyric-line';
    span.dataset.index = i;
    span.textContent = line;
    lyricsBox.appendChild(span);
  });

  // sidebar active
  document.querySelectorAll('.song-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.song-item[data-id="${song.id}"]`).classList.add('active');

  noSong.style.display = 'none';
  playerUI.style.display = 'flex';
}

function playPause() {
  if (!currentSong) return;
  if (audio.paused) {
    audio.play();
    playBtn.classList.add('playing');
    coverImg.classList.add('spinning');
  } else {
    audio.pause();
    playBtn.classList.remove('playing');
    coverImg.classList.remove('spinning');
  }
}

playBtn.addEventListener('click', playPause);

// Sidebar click
document.querySelectorAll('.song-item').forEach(el => {
  el.addEventListener('click', () => {
    const id = parseInt(el.dataset.id);
    loadSong(SONGS[id]);
    audio.play();
    playBtn.classList.add('playing');
    coverImg.classList.add('spinning');
  });
});

// Progress drag
function getPct(e, el) {
  const rect = el.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  return Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
}

progOuter.addEventListener('mousedown', e => {
  isDragging = true;
  const pct = getPct(e, progOuter);
  setProgress(pct);
});
document.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const pct = getPct(e, progOuter);
  setProgress(pct);
});
document.addEventListener('mouseup', e => {
  if (!isDragging) return;
  isDragging = false;
  const pct = getPct(e, progOuter);
  if (audio.duration) audio.currentTime = pct * audio.duration;
});
progOuter.addEventListener('touchstart', e => {
  const pct = getPct(e, progOuter);
  if (audio.duration) audio.currentTime = pct * audio.duration;
}, {passive:true});

function setProgress(pct) {
  progInner.style.width = (pct * 100) + '%';
  progThumb.style.left = (pct * 100) + '%';
  curTime.textContent = fmt(pct * (audio.duration || 0));
}

audio.addEventListener('timeupdate', () => {
  if (isDragging || !audio.duration) return;
  const pct = audio.currentTime / audio.duration;
  setProgress(pct);
  curTime.textContent = fmt(audio.currentTime);

  // lyrics sync
  const lines = lyricsBox.querySelectorAll('.lyric-line');
  const n = lines.length;
  if (!n) return;
  const idx = Math.floor(pct * n);
  lines.forEach((l, i) => {
    l.classList.remove('active', 'past');
    if (i === idx) {
      l.classList.add('active');
      if (lyricsBox.classList.contains('show')) {
        l.scrollIntoView({behavior:'smooth', block:'nearest'});
      }
    } else if (i < idx) l.classList.add('past');
  });
});

audio.addEventListener('loadedmetadata', () => {
  totTime.textContent = fmt(audio.duration);
});

audio.addEventListener('ended', () => {
  if (isRepeat) { audio.currentTime = 0; audio.play(); }
  else { playBtn.classList.remove('playing'); coverImg.classList.remove('spinning'); }
});

// Skip
document.getElementById('b10').addEventListener('click', () => { audio.currentTime = Math.max(0, audio.currentTime - 10); });
document.getElementById('f10').addEventListener('click', () => { audio.currentTime = Math.min(audio.duration||0, audio.currentTime + 10); });
document.getElementById('b5').addEventListener('click', () => { audio.currentTime = Math.max(0, audio.currentTime - 5); });
document.getElementById('f30').addEventListener('click', () => { audio.currentTime = Math.min(audio.duration||0, audio.currentTime + 30); });

// Volume
audio.volume = 0.8;
volSlider.addEventListener('input', () => {
  audio.volume = volSlider.value / 100;
  volVal.textContent = volSlider.value + '%';
});

// Repeat
repeatBtn.addEventListener('click', () => {
  isRepeat = !isRepeat;
  repeatBtn.classList.toggle('active', isRepeat);
  repeatLabel.classList.toggle('show', isRepeat);
});

// Lyrics toggle
lyricsToggle.addEventListener('change', () => {
  if (lyricsToggle.checked) {
    lyricsBox.classList.add('show');
    lyricsHint.textContent = 'Click to hide';
  } else {
    lyricsBox.classList.remove('show');
    lyricsHint.textContent = 'Click to show';
  }
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); playPause(); }
  if (e.code === 'ArrowLeft') audio.currentTime = Math.max(0, audio.currentTime - 10);
  if (e.code === 'ArrowRight') audio.currentTime = Math.min(audio.duration||0, audio.currentTime + 10);
});
</script>
</body>
</html>
