<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7lbsaa Music — استمع الآن</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  /* تحسينات التصميم العام وعناصر الـ UI */
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Tajawal','Inter',sans-serif; background:#0d0d11; color:#fff; min-height:100vh; overflow-x:hidden; }

  /* الهيدر / شريط التنقل */
  nav {
    position:fixed; top:0; left:0; right:0; z-index:200;
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 40px;
    background:rgba(13, 13, 17, 0.85); backdrop-filter:blur(20px);
    border-bottom:1px solid rgba(255,255,255,0.06);
  }
  .nav-logo { font-size:22px; font-weight:900; color:#fff; text-decoration:none; letter-spacing: -0.5px; }
  .nav-logo span { color:#e85d5d; }
  .back-btn {
    display:flex; align-items:center; gap:8px;
    color:rgba(255,255,255,0.6); text-decoration:none; font-size:14px;
    transition:all 0.2s ease;
  }
  .back-btn:hover { color:#e85d5d; transform: translateX(-3px); }

  /* تقسيم الصفحة */
  .page { display:flex; min-height:100vh; padding-top:70px; }

  /* القائمة الجانبية للأغاني */
  .sidebar {
    width:340px; min-width:300px; flex-shrink:0;
    background:#12121a; border-left:1px solid rgba(255,255,255,0.06);
    padding:28px 0; overflow-y:auto;
    position:sticky; top:70px; height:calc(100vh - 70px);
  }
  .sidebar-title {
    font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
    color:rgba(255,255,255,0.3); padding:0 24px 16px; text-align: right;
  }
  .song-list { display: flex; flex-direction: column; gap: 4px; }
  .song-item {
    display:flex; align-items:center; gap:16px;
    padding:14px 24px; cursor:pointer;
    transition:all 0.25s ease;
    border-right:4px solid transparent;
    text-align: right;
  }
  .song-item:hover { background:rgba(255,255,255,0.03); }
  .song-item.active { background:rgba(232,93,93,0.09); border-right-color:#e85d5d; }
  .song-thumb {
    width:50px; height:50px; border-radius:12px; object-fit:cover; flex-shrink:0;
    border:1px solid rgba(255,255,255,0.1);
  }
  .song-meta { flex:1; min-width:0; }
  .song-name { font-size:14px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#f3f3f6; }
  .song-singer { font-size:12px; color:rgba(255,255,255,0.5); margin-top:4px; }
  
  .now-playing-dot {
    width:8px; height:8px; border-radius:50%; background:#e85d5d;
    flex-shrink:0; display:none;
    box-shadow: 0 0 10px #e85d5d;
    animation:blink 1.4s ease-in-out infinite;
  }
  .song-item.active .now-playing-dot { display:block; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* محتوى المشغل الرئيسي */
  .content { flex:1; display:flex; flex-direction:column; background: #0d0d11; }

  /* منطقة المشغل العلوي */
  .player-area {
    display:grid; grid-template-columns: 360px 1fr;
    gap:48px; padding:40px; align-items:start;
  }

  /* كارت المشغل */
  .player-card {
    background:#14141f; border-radius:28px;
    border:1px solid rgba(255,255,255,0.06);
    overflow:hidden; position:sticky; top:110px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  }
  .player-cover { position:relative; aspect-ratio:1; overflow:hidden; margin: 16px; border-radius: 20px; }
  .player-cover img {
    width:100%; height:100%; object-fit:cover;
    display:block; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .player-cover img.spinning { animation:spin-slow 25s linear infinite; }
  @keyframes spin-slow { from{transform:scale(1.02) rotate(0deg)} to{transform:scale(1.02) rotate(360deg)} }

  .player-body { padding:0 24px 24px 24px; }
  .song-info-display { margin-bottom:20px; text-align: center; }
  .disp-title { font-size:22px; font-weight:800; letter-spacing:-0.5px; color: #fff; }
  .disp-artist { font-size:14px; color:#e85d5d; font-weight:500; margin-top:6px; }

  /* شريط التقدم اللمسي الذكي */
  .prog-wrap { margin-bottom:18px; }
  .prog-outer {
    width:100%; height:6px; background:rgba(255,255,255,0.08);
    border-radius:4px; cursor:pointer; position:relative; margin-bottom:8px;
    user-select:none; transition: height 0.1s;
  }
  .prog-outer:hover { height: 8px; }
  .prog-inner {
    height:100%; background: linear-gradient(90deg, #e85d5d, #ff7676); border-radius:4px;
    width:0%; pointer-events:none;
  }
  .prog-thumb {
    position:absolute; top:50%; left:0%;
    width:14px; height:14px; border-radius:50%;
    background:#fff; border:3px solid #e85d5d;
    transform:translate(-50%,-50%);
    opacity:0; transition:opacity 0.15s;
    pointer-events:none; box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
  .prog-outer:hover .prog-thumb { opacity:1; }
  .time-row { display:flex; justify-content:space-between; font-size:12px; color:rgba(255,255,255,0.4); font-family: 'Inter'; }

  /* أزرار التحكم */
  .controls { display:flex; align-items:center; justify-content:center; gap:20px; margin-bottom:20px; }
  .ctrl-btn {
    background:none; border:none; cursor:pointer;
    color:rgba(255,255,255,0.5); padding:8px;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.2s ease; border-radius:50%;
  }
  .ctrl-btn:hover { color:#fff; transform:scale(1.15); }
  .ctrl-btn.active { color:#e85d5d; background: rgba(232,93,93,0.1); }
  .ctrl-btn svg { width:22px; height:22px; }
  
  .play-btn {
    width:56px; height:56px; border-radius:50%;
    background:#e85d5d; border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 24px rgba(232,93,93,0.4);
    transition:all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .play-btn:hover { transform:scale(1.1); box-shadow:0 12px 28px rgba(232,93,93,0.5); }
  .play-btn svg { width:24px; height:24px; fill:#fff; transition: transform 0.1s; }
  .play-btn .pi { display:block; transform: translateX(-2px); } .play-btn .pau { display:none; }
  .play-btn.playing .pi { display:none; } .play-btn.playing .pau { display:block; transform: translateX(0); }

  /* أزرار القفز السريع */
  .seek-row { display:flex; gap:10px; margin-bottom:18px; }
  .seek-btn {
    flex:1; padding:9px 0;
    background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07);
    color:rgba(255,255,255,0.6); border-radius:12px; font-size:12px; font-weight:600;
    cursor:pointer; transition:all 0.2s ease;
  }
  .seek-btn:hover { background:rgba(232,93,93,0.12); color:#e85d5d; border-color:rgba(232,93,93,0.25); }

  /* الصوت */
  .vol-row { display:flex; align-items:center; gap:12px; margin-bottom:18px; }
  .vol-row svg { width:18px; height:18px; fill:rgba(255,255,255,0.4); flex-shrink:0; }
  input[type=range] {
    -webkit-appearance:none; flex:1; height:4px;
    background:rgba(255,255,255,0.1); border-radius:2px; cursor:pointer; outline:none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; width:12px; height:12px;
    border-radius:50%; background:#e85d5d; cursor:pointer; transition: transform 0.1s;
  }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }
  .vol-val { font-size:12px; color:rgba(255,255,255,0.4); min-width:35px; text-align:left; font-family: 'Inter'; }

  /* زر التكرار والملصق */
  .bottom-row { display:flex; align-items:center; gap:12px; }
  .repeat-label {
    font-size:12px; color:#e85d5d; background:rgba(232,93,93,0.08);
    padding:4px 12px; border-radius:20px; border:1px solid rgba(232,93,93,0.15);
    display:none; font-weight: 500;
  }
  .repeat-label.show { display:inline-block; }

  /* لوحة النصوص والبيانات الجانبية */
  .right-details { text-align: right; display: flex; flex-direction: column; justify-content: center; }

  /* كلمات الأغاني المتزامنة */
  .lyrics-panel {
    flex:1; padding:40px;
    border-top:1px solid rgba(255,255,255,0.05);
  }
  .lyrics-toggle-row {
    display:flex; align-items:center; gap:14px; margin-bottom:24px; text-align: right;
  }
  .lyrics-toggle-label { font-size:18px; font-weight:700; color: #fff; }
  .toggle-switch {
    position:relative; width:46px; height:24px;
    cursor:pointer; user-select:none;
  }
  .toggle-switch input { opacity:0; width:0; height:0; }
  .toggle-track {
    position:absolute; inset:0; background:rgba(255,255,255,0.1);
    border-radius:12px; transition:background 0.25s ease;
  }
  .toggle-switch input:checked + .toggle-track { background:#e85d5d; }
  .toggle-thumb {
    position:absolute; top:3px; right:3px;
    width:18px; height:18px; border-radius:50%; background:#fff;
    transition:transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .toggle-switch input:checked ~ .toggle-thumb { transform:translateX(-22px); }

  .lyrics-box {
    background:#12121a; border-radius:24px;
    border:1px solid rgba(255,255,255,0.05);
    padding:40px; direction:rtl;
    line-height:2.4; font-size:18px;
    color:rgba(255,255,255,0.35);
    max-height:420px; overflow-y:auto;
    display:none; text-align: center;
    scroll-behavior:smooth;
  }
  .lyrics-box.show { display:block; }
  .lyric-line { display:block; padding:8px 0; transition:all 0.3s ease; transform: scale(0.95); opacity: 0.5; }
  .lyric-line.active { color:#fff; font-size:22px; font-weight:800; transform: scale(1); opacity: 1; text-shadow: 0 4px 12px rgba(255,255,255,0.1); }
  .lyric-line.past { color:rgba(255,255,255,0.15); }

  /* شاشة الانتظار المبدئية */
  .no-song {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:120px 20px; text-align:center; color:rgba(255,255,255,0.3);
    gap:20px;
  }
  .no-song svg { width:64px; height:64px; opacity:0.2; color: #e85d5d; }
  .no-song p { font-size:16px; font-weight: 500; }

  /* التجاوب مع الشاشات المتنقلة والهواتف */
  @media(max-width:940px){
    .page { flex-direction:column; padding-top: 60px; }
    .sidebar { width:100%; position:static; height:auto; border-left:none; border-bottom:1px solid rgba(255,255,255,0.06); padding: 20px 0; }
    .player-area { grid-template-columns:1fr; gap: 30px; padding:24px; }
    .player-card { position:static; }
    nav { padding:14px 20px; }
    .lyrics-panel { padding:24px; }
    .right-details { text-align: center; align-items: center; }
  }
</style>
</head>

<!-- ربط Firebase من خلال سكريبت كود الوحدات المستقلة (ES Modules) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
// دمج خوادم فري بيز لاستخراج البيانات
import { getFirestore, collection, getDocs, orderById } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

// إعدادات Firebase الخاصة بك
const firebaseConfig = {
  apiKey: "AIzaSyCk9l8XNO4y-6qnaOqKsfAKQPbaemOOHrU",
  authDomain: "students-d06e7.firebaseapp.com",
  projectId: "students-d06e7",
  storageBucket: "students-d06e7.firebasestorage.app",
  messagingSenderId: "932035308750",
  appId: "1:932035308750:web:781364ca90256bca80749f",
  measurementId: "G-6VBEFTCHVG"
};

// تهيئة تطبيقات Firebase و Firestore
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const db = getFirestore(app);

// عناصر الـ DOM الواجهة الرسومية
const audio = document.getElementById('audio');
const playBtn = document.getElementById('playBtn');
const progOuter = document.getElementById('progOuter');
const progInner = document.getElementById('progInner');
const progThumb = document.getElementById('progThumb');
const curTime = document.getElementById('curTime');
const totTime = document.getElementById('totTime');
const volSlider = document.getElementById('volSlider');
const volVal = document.getElementById('volVal');
const repeatBtn = document.getElementById('repeatBtn');
const repeatLabel = document.getElementById('repeatLabel');
const coverImg = document.getElementById('coverImg');
const dispTitle = document.getElementById('dispTitle');
const dispArtist = document.getElementById('dispArtist');
const bigTitle = document.getElementById('bigTitle');
const bigArtist = document.getElementById('bigArtist');
const lyricsToggle = document.getElementById('lyricsToggle');
const lyricsBox = document.getElementById('lyricsBox');
const lyricsHint = document.getElementById('lyricsHint');
const noSong = document.getElementById('noSong');
const playerUI = document.getElementById('playerUI');
const playlistContainer = document.getElementById('playlistContainer');

let SONGS = [];
let currentSong = null;
let isRepeat = false;
let isDragging = false;

// دالة لتنسيق الوقت بصيغة دقيقة:ثانية
function fmt(s) {
  if (!isFinite(s) || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

// 1. جلب البيانات من داتابيز Firestore ديناميكيًا
async function fetchSongsFromFirebase() {
  try {
    // نفترض اسم الكولكشن في فايربيز هو 'songs'
    const querySnapshot = await getDocs(collection(db, "songs"));
    SONGS = [];
    
    querySnapshot.forEach((doc) => {
      const data = doc.data();
      SONGS.push({
        id: data.id, 
        title: data.title,
        artist: data.artist,
        src: data.src, // رابط ملف الـ m4a أو الـ mp3 السحابي
        cover: data.cover, // رابط صورة الغلاف السحابي
        lyrics: data.lyrics || [] // مصفوفة كلمات الأغنية [ "السطر الاول", "الثاني" ]
      });
    });

    // ترتيب الأغاني بناءً على معرف الـ ID تصاعديًا
    SONGS.sort((a, b) => a.id - b.id);
    
    // بناء وعرض قائمة التشغيل بالواجهة الرسومية بعد وصول الداتا
    renderPlaylist();
  } catch (error) {
    console.error("حدث خطأ أثناء جلب الأغاني من قاعدة البيانات: ", error);
    playlistContainer.innerHTML = `<p style="text-align:center; font-size:12px; color:#e85d5d">فشل تحميل الأغاني من السيرفر.</p>`;
  }
}

// دالة بناء عناصر الأغاني بـ HTML في القائمة الجانبية
function renderPlaylist() {
  if(SONGS.length === 0) {
     playlistContainer.innerHTML = `<p style="text-align:center; font-size:12px; color:rgba(255,255,255,0.3)">لا توجد أغاني متاحة حاليًا.</p>`;
     return;
  }
  
  playlistContainer.innerHTML = '';
  SONGS.forEach(song => {
    const songItem = document.createElement('div');
    songItem.className = 'song-item';
    songItem.setAttribute('data-id', song.id);
    songItem.innerHTML = `
      <img class="song-thumb" src="${song.cover}" alt="${song.title}">
      <div class="song-meta">
        <div class="song-name">${song.title}</div>
        <div class="song-singer">${song.artist.split('·')[0]}</div>
      </div>
      <div class="now-playing-dot"></div>
    `;
    
    songItem.addEventListener('click', () => {
      loadSong(song);
      audio.play().then(() => {
        playBtn.classList.add('playing');
        coverImg.classList.add('spinning');
      });
    });
    
    playlistContainer.appendChild(songItem);
  });
}

// دالة تحميل الأغنية المختارة إلى جهاز المشغل
function loadSong(song) {
  currentSong = song;
  audio.src = song.src;
  audio.volume = volSlider.value / 100;
  coverImg.src = song.cover;
  dispTitle.textContent = song.title;
  dispArtist.textContent = song.artist;
  bigTitle.textContent = song.title;
  bigArtist.textContent = song.artist;
  
  // إعادة تصفير شريط التقدم والوقت
  progInner.style.width = '0%';
  progThumb.style.left = '0%';
  curTime.textContent = '0:00';
  totTime.textContent = '0:00';
  coverImg.classList.remove('spinning');
  playBtn.classList.remove('playing');

  // بناء أسطر الكلمات داخل لوحة الغناء المتزامن
  lyricsBox.innerHTML = '';
  song.lyrics.forEach((line, i) => {
    const span = document.createElement('span');
    span.className = 'lyric-line';
    span.dataset.index = i;
    span.textContent = line;
    lyricsBox.appendChild(span);
  });
  lyricsBox.scrollTop = 0;

  // إدارة تفعيل الأغنية النشطة داخل القائمة الجانبية
  document.querySelectorAll('.song-item').forEach(el => el.classList.remove('active'));
  const activeItem = document.querySelector(`.song-item[data-id="${song.id}"]`);
  if (activeItem) activeItem.classList.add('active');

  // إخفاء رسالة الترحيب وعرض واجهة المشغل
  noSong.style.display = 'none';
  playerUI.style.display = 'flex';
}

// تشغيل وإيقاف الصوت مؤقتًا
function playPause() {
  if (!currentSong) return;
  if (audio.paused) {
    audio.play();
    playBtn.classList.add('playing');
    coverImg.classList.add('spinning');
  } else {
    audio.pause();
    playBtn.classList.remove('playing');
    coverImg.classList.remove('spinning');
  }
}

playBtn.addEventListener('click', playPause);

// دالة حساب موقع الضغط أو السحب بدقة وملاءمته مئويًا بشريط التشغيل
function getPct(e, el) {
  const rect = el.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  return Math.max(0, Math.min(1, (rect.right - clientX) / rect.width)); // معدلة لتعمل بالتوافق التام مع اتجاه الـ RTL من اليمين
}

// التحكم بالسحب والنقر الفأري على شريط التشغيل
progOuter.addEventListener('mousedown', e => {
  isDragging = true;
  const pct = getPct(e, progOuter);
  setProgress(pct);
});

document.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const pct = getPct(e, progOuter);
  setProgress(pct);
});

document.addEventListener('mouseup', e => {
  if (!isDragging) return;
  isDragging = false;
  const pct = getPct(e, progOuter);
  if (audio.duration) audio.currentTime = pct * audio.duration;
});

// لمس شاشات الهاتف المحمول
progOuter.addEventListener('touchstart', e => {
  const pct = getPct(e, progOuter);
  if (audio.duration) audio.currentTime = pct * audio.duration;
}, {passive:true});

function setProgress(pct) {
  progInner.style.width = (pct * 100) + '%';
  progThumb.style.left = (pct * 100) + '%';
  curTime.textContent = fmt(pct * (audio.duration || 0));
}

// تحديث مستمر لتوقيت شريط المتابعة والكلمات المتزامنة مع حركة الموسيقى التلقائية
audio.addEventListener('timeupdate', () => {
  if (isDragging || !audio.duration) return;
  const pct = audio.currentTime / audio.duration;
  setProgress(pct);
  curTime.textContent = fmt(audio.currentTime);

  // نظام ذكي للمزامنة التلقائية لأسطر الكلمات تدرجيًا
  const lines = lyricsBox.querySelectorAll('.lyric-line');
  const n = lines.length;
  if (!n) return;
  
  const idx = Math.min(Math.floor(pct * n), n - 1);
  lines.forEach((l, i) => {
    l.classList.remove('active', 'past');
    if (i === idx) {
      l.classList.add('active');
      if (lyricsToggle.checked) {
        l.scrollIntoView({behavior:'smooth', block:'center'});
      }
    } else if (i < idx) {
      l.classList.add('past');
    }
  });
});

audio.addEventListener('loadedmetadata', () => {
  totTime.textContent = fmt(audio.duration);
});

audio.addEventListener('ended', () => {
  if (isRepeat) { 
    audio.currentTime = 0; 
    audio.play(); 
  } else { 
    playBtn.classList.remove('playing'); 
    coverImg.classList.remove('spinning'); 
  }
});

// أزرار تقديم وتأخير الوقت المباشرة
document.getElementById('b10').addEventListener('click', () => { audio.currentTime = Math.max(0, audio.currentTime - 10); });
document.getElementById('f10').addEventListener('click', () => { audio.currentTime = Math.min(audio.duration||0, audio.currentTime + 10); });
document.getElementById('b5').addEventListener('click', () => { audio.currentTime = Math.max(0, audio.currentTime - 5); });
document.getElementById('f30').addEventListener('click', () => { audio.currentTime = Math.min(audio.duration||0, audio.currentTime + 30); });

// التحكم الدقيق بمستوى وهندسة الصوت
volSlider.addEventListener('input', () => {
  audio.volume = volSlider.value / 100;
  volVal.textContent = volSlider.value + '%';
});

// زر تفعيل خاصية تكرار الأغنية المحددة
repeatBtn.addEventListener('click', () => {
  isRepeat = !isRepeat;
  repeatBtn.classList.toggle('active', isRepeat);
  repeatLabel.classList.toggle('show', isRepeat);
});

// إظهار وإخفاء لوحة نصوص الأغاني بسلاسة
lyricsToggle.addEventListener('change', () => {
  if (lyricsToggle.checked) {
    lyricsBox.classList.add('show');
    lyricsHint.textContent = 'اضغط للإخفاء';
    // عمل سكرول سريع ومباشر للسطر الحالي الفعال عند الفتح
    const activeLine = lyricsBox.querySelector('.lyric-line.active');
    if(activeLine) activeLine.scrollIntoView({block:'center'});
  } else {
    lyricsBox.classList.remove('show');
    lyricsHint.textContent = 'اضغط للعرض';
  }
});

// التحكم الاختصاري السريع عبر أزرار لوحة المفاتيح الهاردوير
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); playPause(); }
  if (e.code === 'ArrowLeft') audio.currentTime = Math.max(0, audio.currentTime - 10);
  if (e.code === 'ArrowRight') audio.currentTime = Math.min(audio.duration||0, audio.currentTime + 10);
});

// تشغيل جلب البيانات الأساسية من السيرفر عند تحميل الصفحة أول مرة
fetchSongsFromFirebase();
</script>
</body>
</html>
